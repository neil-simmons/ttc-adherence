name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false # We don't need LFS since we moved files to a Dataset

      - name: Push to Hugging Face (Clean History)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup Identity
          git config --global user.email "neil-simmons@users.noreply.github.com"
          git config --global user.name "neil-simmons"

          # 2. Create a "Shallow" commit
          # This creates a new branch with NO history, containing only your current files
          git checkout --orphan temp-branch
          git add -A
          git commit -m "Deploying clean version to HF Spaces"

          # 3. Force push this single-commit branch to the main branch of your Space
          # REPLACE 'neil-simmons' and 'TrackTO' if they are different
          git push --force https://neil-simmons:$HF_TOKEN@huggingface.co/spaces/neil-simmons/TTC-ScheduleWatch temp-branch:main
